networks:
  vaultnet_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: vaultnet_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - vaultnet_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vaultnet_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - vaultnet_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  go-service:
    build:
      context: ./go-service
      dockerfile: Dockerfile
    container_name: vaultnet_go_service
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - vaultnet_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  python-sidecar:
    build:
      context: ./python-sidecar
      dockerfile: Dockerfile
    container_name: vaultnet_python_sidecar
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - vaultnet_net
    depends_on:
      postgres:
        condition: service_healthy
      go-service:
        condition: service_started

  prometheus:
    image: prom/prometheus:latest
    container_name: vaultnet_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - vaultnet_net
    depends_on:
      - go-service

  grafana:
    image: grafana/grafana:latest
    container_name: vaultnet_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - vaultnet_net
    depends_on:
      - prometheus

  nginx:
    image: nginx:alpine
    container_name: vaultnet_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - vaultnet_net
    depends_on:
      - go-service